<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        body { background: #111; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: linear-gradient(135deg, #00feba, #5b548a); color: #fff; padding: 30px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .search { display: flex; gap: 10px; margin-bottom: 25px; }
        input { border: 0; outline: 0; background: #fff; color: #333; padding: 12px 20px; border-radius: 30px; flex: 1; font-size: 16px; }
        button { border: 0; outline: 0; background: #fff; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; transition: 0.3s; }
        button:hover { background: #ddd; }
        .temp { font-size: 70px; font-weight: 600; margin: 10px 0; }
        .city { font-size: 35px; font-weight: 500; margin-top: -10px; }
        .details { display: flex; justify-content: space-between; margin-top: 30px; padding: 0 10px; }
        .col { display: flex; flex-direction: column; align-items: center; }
        .col p { margin: 5px 0; font-size: 14px; }
        .humidity, .wind { font-size: 18px !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button>🔍</button>
        </div>
        <div class="weather">
            <h1 class="temp">--°C</h1>
            <h2 class="city">Waiting...</h2>
            <div class="details">
                <div class="col">
                    <p class="humidity">--%</p>
                    <p>Humidity</p>
                </div>
                <div class="col">
                    <p class="wind">-- km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
