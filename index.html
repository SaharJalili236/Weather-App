<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        /* استایل سریع برای اینکه سایت قشنگ شود */
        body { background: #222; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: linear-gradient(135deg, #00feba, #5b548a); color: #fff; padding: 40px; border-radius: 20px; text-align: center; width: 300px; }
        .search { display: flex; gap: 10px; margin-bottom: 20px; }
        input { border: 0; outline: 0; background: #ebfffc; color: #555; padding: 10px; border-radius: 20px; flex: 1; }
        button { border: 0; outline: 0; background: #ebfffc; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
        .temp { font-size: 60px; margin-top: 10px; }
        .city { font-size: 30px; font-weight: 400; margin-top: -10px; }
        .details { display: flex; justify-content: space-between; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button>🔍</button>
        </div>
        <div class="weather">
            <h1 class="temp">--°C</h1>
            <h2 class="city">Search a City</h2>
            <div class="details">
                <div class="col">
                    <p class="humidity">--%</p>
                    <p>Humidity</p>
                </div>
                <div class="col">
                    <p class="wind">-- km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
